name: Deploy dev tools to Lolipop

# tools/ 以下が変わった時に実行→ /mokiss/dev/ に一括デプロイ
on:
  push:
    branches:
      - main
    paths:
      - 'tools/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       21
          local-dir:  ./tools/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/api_config.php
            **/__pycache__/**
            **/*.pyc
            **/debug/**
