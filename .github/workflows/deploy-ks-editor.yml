name: Deploy to Lolipop /mokiss/

# tools/dev/ 以下が変わった時に実行
# デプロイ構造: tools/dev/ → /mokiss/dev/
on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp)
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USER:     ${{ secrets.FTP_USERNAME }}
          FTP_PASS:     ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR:   ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:passive-mode on;
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER;
            mirror -R --delete --verbose \
              --exclude=api_config.php \
              --exclude-glob=*.pyc \
              --exclude-glob=__pycache__ \
              ./tools/dev/ $REMOTE_DIR;
            quit
          "
