name: Deploy to Lolipop /mokiss/

on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USER:   ${{ secrets.FTP_USERNAME }}
      FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
      REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Python ftplib (recursive CWD)
        run: |
          python3 - << 'PYEOF'
          import ftplib, os, sys
          from pathlib import Path

          server = os.environ['FTP_SERVER']
          user   = os.environ['FTP_USER']
          passwd = os.environ['FTP_PASS']
          # REMOTE_DIR=mokiss → deploy to mokiss/dev/
          remote_path = os.environ['REMOTE_DIR'].strip('/') + '/dev'

          LOCAL_DIR = Path('./tools/dev')
          EXCLUDES  = {'api_config.php'}

          def ftp_enter(ftp, dirname):
              """ディレクトリがなければ作ってCWD"""
              try:
                  ftp.mkd(dirname)
                  print(f'    mkdir {dirname}')
              except ftplib.error_perm:
                  pass  # already exists
              ftp.cwd(dirname)

          def deploy_dir(ftp, local_path):
              """カレントディレクトリにlocal_pathの中身をアップロード"""
              for item in sorted(local_path.iterdir()):
                  if item.name in EXCLUDES:
                      continue
                  if item.is_dir():
                      ftp_enter(ftp, item.name)
                      deploy_dir(ftp, item)
                      ftp.cwd('..')
                  elif item.is_file():
                      print(f'  PUT {item.name}')
                      with open(item, 'rb') as f:
                          ftp.storbinary(f'STOR {item.name}', f)

          try:
              ftp = ftplib.FTP()
              ftp.connect(server, 21, timeout=30)
              resp = ftp.login(user, passwd)
              print('Login:', resp.strip())
              ftp.set_pasv(True)

              # remote_path (例: mokiss/dev) まで1階層ずつCWD
              print(f'=== Navigating to {remote_path}/ ===')
              for part in remote_path.split('/'):
                  ftp_enter(ftp, part)

              print('=== Uploading files ===')
              deploy_dir(ftp, LOCAL_DIR)
              ftp.quit()
              print('=== Deploy complete! ===')
          except Exception as e:
              print(f'ERROR: {type(e).__name__}: {e}', file=sys.stderr)
              import traceback; traceback.print_exc()
              sys.exit(1)
          PYEOF
