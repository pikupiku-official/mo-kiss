name: Deploy to Lolipop /mokiss/

on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USER:   ${{ secrets.FTP_USERNAME }}
      FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
      REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP structure investigation
        run: |
          python3 - << 'PYEOF'
          import ftplib, os, sys

          server = os.environ['FTP_SERVER']
          user   = os.environ['FTP_USER']
          passwd = os.environ['FTP_PASS']

          ftp = ftplib.FTP()
          ftp.connect(server, 21, timeout=15)
          resp = ftp.login(user, passwd)
          print('Login:', resp.strip())
          ftp.set_pasv(True)

          # 現在地のリスト（パス指定なし）
          print('=== nlst() no arg ===')
          try:
              for f in sorted(ftp.nlst()):
                  print(' ', f)
          except Exception as e:
              print(' error:', e)

          # よくあるロリポップのパスを試す
          candidates = ['mokiss', 'web', 'pikupikutai.pinoko.jp', 'public_html', 'www', '.']
          for c in candidates:
              try:
                  listing = ftp.nlst(c)
                  print(f'=== nlst({c}) ===')
                  for f in listing[:10]:
                      print(' ', f)
              except Exception as e:
                  print(f'nlst({c}): {type(e).__name__}: {e}')

          ftp.quit()
          PYEOF
        continue-on-error: true

      - name: Deploy (skip if explore fails)
        run: echo "Deploy step placeholder - fix path first"
