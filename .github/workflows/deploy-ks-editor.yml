name: Deploy KS Editor to Lolipop

# tools/ks-editor/ のファイルが変わった時だけ実行
on:
  push:
    branches:
      - main
    paths:
      - 'tools/ks-editor/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       21
          local-dir:  ./tools/ks-editor/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/api_config.php
            **/api_config.sample.php
