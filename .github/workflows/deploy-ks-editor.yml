name: Deploy to Lolipop /mokiss/

on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USER:   ${{ secrets.FTP_USERNAME }}
      FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
      REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP directory listing via curl
        run: |
          echo "=== / ==="
          curl --ftp-pasv --silent "ftp://$FTP_SERVER/" --user "$FTP_USER:$FTP_PASS" --list-only 2>&1 || true
          echo "=== /mokiss/ ==="
          curl --ftp-pasv --silent "ftp://$FTP_SERVER/mokiss/" --user "$FTP_USER:$FTP_PASS" --list-only 2>&1 || true
        continue-on-error: true

      - name: Deploy via Python ftplib
        run: |
          python3 - << 'PYEOF'
          import ftplib, os, sys
          from pathlib import Path

          server = os.environ['FTP_SERVER']
          user   = os.environ['FTP_USER']
          passwd = os.environ['FTP_PASS']
          remote = os.environ['REMOTE_DIR'].rstrip('/')

          def ensure_dir(ftp, path):
              parts = [p for p in path.split('/') if p]
              for i, part in enumerate(parts):
                  current = '/'.join(parts[:i+1])
                  try:
                      ftp.mkd(current)
                      print(f"  mkdir {current}")
                  except ftplib.error_perm as e:
                      if '550' in str(e):
                          pass  # already exists
                      else:
                          raise

          def upload_dir(ftp, local_dir, remote_base):
              excludes = {'api_config.php', '__pycache__'}
              for item in sorted(Path(local_dir).rglob('*')):
                  if any(e in item.parts for e in excludes):
                      continue
                  if item.suffix == '.pyc':
                      continue
                  rel = item.relative_to(local_dir)
                  remote_path = remote_base + '/' + '/'.join(rel.parts)
                  if item.is_dir():
                      ensure_dir(ftp, remote_path)
                  elif item.is_file():
                      ensure_dir(ftp, str(Path(remote_path).parent))
                      print(f"  upload {remote_path}")
                      with open(item, 'rb') as f:
                          ftp.storbinary(f'STOR {remote_path}', f)

          try:
              ftp = ftplib.FTP()
              ftp.connect(server, 21, timeout=30)
              ftp.login(user, passwd)
              ftp.set_pasv(True)
              print("Connected. PWD:", ftp.pwd())
              ensure_dir(ftp, remote)
              upload_dir(ftp, './tools', remote)
              ftp.quit()
              print("Deploy complete!")
          except Exception as e:
              print("ERROR:", type(e).__name__, str(e), file=sys.stderr)
              sys.exit(1)
          PYEOF
