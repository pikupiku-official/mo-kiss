name: Deploy to Lolipop /mokiss/

on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USER:   ${{ secrets.FTP_USERNAME }}
      FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
      REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Explore FTP structure (Python)
        run: |
          python3 - << 'PYEOF'
          import ftplib, os, sys
          server = os.environ['FTP_SERVER']
          user   = os.environ['FTP_USER']
          passwd = os.environ['FTP_PASS']
          try:
              ftp = ftplib.FTP(timeout=15)
              ftp.connect(server, 21)
              ftp.login(user, passwd)
              print("=== pwd ===")
              print(ftp.pwd())
              print("=== nlst (filenames) ===")
              for f in sorted(ftp.nlst()):
                  print(f)
              ftp.quit()
          except Exception as e:
              print("ERROR:", e, file=sys.stderr)
              sys.exit(1)
          PYEOF
        continue-on-error: true

      - name: Deploy via FTP
        run: |
          printf '%s\n' \
            "set ssl:verify-certificate no" \
            "set ftp:passive-mode on" \
            "set net:timeout 30" \
            "set net:max-retries 3" \
            "open -u $FTP_USER,$FTP_PASS $FTP_SERVER" \
            "mirror -R --verbose --exclude=api_config.php --exclude-glob=*.pyc ./tools/ $REMOTE_DIR" \
            "bye" | timeout 120 lftp 2>&1
