name: Deploy to Lolipop via SSH

on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_PASS: ${{ secrets.SSH_PASS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass + rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Find correct web path via SSH
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $SSH_USER@$SSH_HOST \
            "echo '=== home ===' && pwd && echo '=== ls ~/ ===' && ls ~/ && echo '=== find mokiss ===' && find ~/ -maxdepth 3 -name 'wp-config.php' 2>/dev/null | head -5"
        continue-on-error: true

      - name: Create remote directory and deploy
        run: |
          # mokiss の実際のパスを検出して使う（xargs -r: 空入力時は実行しない）
          WEB_PATH=$(sshpass -p "$SSH_PASS" ssh \
            -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $SSH_USER@$SSH_HOST \
            'find $HOME -maxdepth 4 -name "wp-config.php" 2>/dev/null | grep mokiss | head -1 | xargs -r dirname')

          echo "Detected mokiss path: $WEB_PATH"

          if [ -z "$WEB_PATH" ]; then
            # リモートの $HOME を取得してフォールバック（ローカルの $HOME は使わない）
            REMOTE_HOME=$(sshpass -p "$SSH_PASS" ssh \
              -p $SSH_PORT \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              $SSH_USER@$SSH_HOST \
              'echo $HOME')
            echo "WARNING: Could not detect path, fallback with remote HOME=$REMOTE_HOME"
            WEB_PATH="$REMOTE_HOME/pikupikutai.pinoko.jp/mokiss"
          fi

          DEPLOY_TO="${SSH_USER}@${SSH_HOST}:${WEB_PATH}/dev/"
          echo "Deploying to: $DEPLOY_TO"

          sshpass -p "$SSH_PASS" ssh \
            -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $SSH_USER@$SSH_HOST \
            "mkdir -p ${WEB_PATH}/dev/ks-editor"

          sshpass -p "$SSH_PASS" rsync -avz \
            --ignore-times \
            --exclude=api_config.php \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./tools/dev/ \
            "${SSH_USER}@${SSH_HOST}:${WEB_PATH}/dev/"
