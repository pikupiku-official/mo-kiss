name: Deploy to Lolipop /mokiss/

on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USER:   ${{ secrets.FTP_USERNAME }}
      FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
      REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Python ftplib (no PWD)
        run: |
          python3 - << 'PYEOF'
          import ftplib, os, sys
          from pathlib import Path

          server = os.environ['FTP_SERVER']
          user   = os.environ['FTP_USER']
          passwd = os.environ['FTP_PASS']
          remote = os.environ['REMOTE_DIR'].strip('/')

          EXCLUDES = {'api_config.php', '__pycache__', '.git'}

          def ftp_mkdirs(ftp, path):
              """PWDなしでディレクトリを再帰的に作成"""
              parts = [p for p in path.split('/') if p]
              for i in range(len(parts)):
                  d = '/'.join(parts[:i+1])
                  try:
                      ftp.mkd(d)
                  except ftplib.error_perm as e:
                      if '550' not in str(e) and '521' not in str(e):
                          raise  # already exists は無視

          def deploy(ftp, local_dir, remote_base):
              local_dir = Path(local_dir)
              for item in sorted(local_dir.rglob('*')):
                  if any(e in item.parts for e in EXCLUDES):
                      continue
                  if item.suffix == '.pyc':
                      continue
                  rel = item.relative_to(local_dir)
                  remote_path = remote_base + '/' + '/'.join(rel.parts)
                  if item.is_dir():
                      ftp_mkdirs(ftp, remote_path)
                  elif item.is_file():
                      ftp_mkdirs(ftp, '/'.join(remote_path.split('/')[:-1]))
                      print(f'  PUT {remote_path}')
                      with open(item, 'rb') as f:
                          ftp.storbinary(f'STOR {remote_path}', f)

          try:
              ftp = ftplib.FTP()
              ftp.connect(server, 21, timeout=30)
              resp = ftp.login(user, passwd)
              print('Login:', resp.strip())
              ftp.set_pasv(True)

              # PWDは呼ばない（ロリポップで禁止）
              print('=== Explore root (NLST) ===')
              try:
                  for f in sorted(ftp.nlst()):
                      print(f'  {f}')
              except Exception as e:
                  print(f'  NLST failed: {e}')

              print(f'=== Deploying to {remote}/ ===')
              ftp_mkdirs(ftp, remote)
              deploy(ftp, './tools', remote)
              ftp.quit()
              print('=== Deploy complete! ===')
          except Exception as e:
              print(f'ERROR: {type(e).__name__}: {e}', file=sys.stderr)
              sys.exit(1)
          PYEOF
