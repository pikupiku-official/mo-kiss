name: Deploy to Lolipop /mokiss/

# デプロイ構造: tools/ → /mokiss/
#   tools/dev/ks-editor/ → /mokiss/dev/ks-editor/
on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USER:   ${{ secrets.FTP_USERNAME }}
      FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
      REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Test FTP connection
        run: lftp -e "set ssl:verify-certificate no; set ftp:passive-mode on; open -u $FTP_USER,$FTP_PASS $FTP_SERVER; pwd; ls; bye" 2>&1
        continue-on-error: true

      - name: Deploy via FTP
        run: |
          printf '%s\n' \
            "set ssl:verify-certificate no" \
            "set ftp:passive-mode on" \
            "set net:timeout 30" \
            "set net:max-retries 3" \
            "open -u $FTP_USER,$FTP_PASS $FTP_SERVER" \
            "mirror -R --verbose --exclude=api_config.php --exclude-glob=*.pyc ./tools/ $REMOTE_DIR" \
            "bye" > /tmp/deploy.lftp
          echo "--- lftp script ---"
          cat /tmp/deploy.lftp
          echo "--- running lftp ---"
          lftp -f /tmp/deploy.lftp
