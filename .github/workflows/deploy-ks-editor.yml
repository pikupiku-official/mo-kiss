name: Deploy to Lolipop via SSH

# tools/dev/ が変わった時に自動実行
# デプロイ先: ~/mokiss/dev/ (SSH)
on:
  push:
    branches:
      - main
    paths:
      - 'tools/dev/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_PASS: ${{ secrets.SSH_PASS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass + rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Create remote directory
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $SSH_USER@$SSH_HOST \
            "mkdir -p ~/mokiss/dev/ks-editor"

      - name: Deploy via rsync over SSH
        run: |
          sshpass -p "$SSH_PASS" rsync -avz \
            --ignore-times \
            --exclude=api_config.php \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./tools/dev/ \
            $SSH_USER@$SSH_HOST:~/mokiss/dev/
